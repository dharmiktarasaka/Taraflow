services:
  - type: web
    name: taraflow-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        placeholder: "https://your-vercel-app.vercel.app"
      - key: MONGODB_URI
        placeholder: "mongodb+srv://..."
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        placeholder: "32-byte hex key for credential encryption"
      - key: QWEN_API_KEY
        placeholder: "NVIDIA NIM QWEN API Key"
      - key: GEMINI_API_KEY
        placeholder: "Gemini API Key"
      - key: FACEBOOK_REDIRECT_URI
        value: "/social/callback/facebook"
      - key: INSTAGRAM_REDIRECT_URI
        value: "/social/callback/instagram"
      - key: THREADS_REDIRECT_URI
        value: "/social/callback/threads"
      - key: LINKEDIN_REDIRECT_URI
        value: "/social/callback/linkedin"
      - key: LINKEDIN_OAUTH_SCOPE
        value: "w_member_social openid profile email"
      - key: ALLOWED_OAUTH_ORIGINS
        value: "http://localhost:5173,https://taraflow.vercel.app"
      - key: PINTEREST_REDIRECT_URI
        value: "/social/callback/pinterest"
      - key: GOOGLE_BUSINESS_REDIRECT_URI
        value: "/social/callback/google_business"
      # SMTP Email Config (General — password reset, verification, etc.)
      - key: EMAIL_HOST
        value: "sandbox.smtp.mailtrap.io"
      - key: EMAIL_PORT
        value: "2525"
      - key: EMAIL_SECURE
        value: "false"
      - key: EMAIL_USER
        placeholder: "Mailtrap username (general emails)"
      - key: EMAIL_PASS
        placeholder: "Mailtrap password (general emails)"
      - key: EMAIL_FROM
        value: "noreply@taraflow.ai"
      - key: EMAIL_TLS_REJECT_UNAUTHORIZED
        value: "true"
      # Resend API (HTTP-based email bypass for Render Free Tier)
      - key: RESEND_API_KEY
        placeholder: "Resend API Key (replaces Gmail SMTP for invite emails)"
      # SMTP Email Config (Workspace Invitations ONLY — separate Gmail account)
      - key: INVITE_EMAIL_HOST
        value: "smtp.gmail.com"
      - key: INVITE_EMAIL_PORT
        value: "465"
      - key: INVITE_EMAIL_SECURE
        value: "true"
      - key: INVITE_EMAIL_USER
        placeholder: "Gmail username (workspace invite emails)"
      - key: INVITE_EMAIL_PASS
        placeholder: "Gmail App Password (workspace invite emails)"
      - key: INVITE_EMAIL_FROM
        placeholder: "Gmail from email address"
      - key: INVITE_EMAIL_TLS_REJECT_UNAUTHORIZED
        value: "true"
